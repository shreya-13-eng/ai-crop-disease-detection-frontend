<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AgriScan AI</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <!-- Your CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>

<body>
    <!-- Simple Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-tree-fill me-2"></i>AgriScan AI
            </a>
            <a href="index.html" class="btn btn-outline-light">
                <i class="bi bi-box-arrow-in-right me-2"></i>Back to Login
            </a>
        </div>
    </nav>

    <!-- Signup Form -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Join AgriScan AI to protect your crops</p>
            </div>

            <div id="signupAlert"></div>

            <form id="signupForm" class="auth-form">
                <div class="form-group mb-3">
                    <label for="signupName" class="form-label">Full Name *</label>
                    <div class="input-group position-relative">
                        <i class="bi bi-person position-absolute" style="left: 15px; top: 12px; z-index: 10;"></i>
                        <input type="text" class="form-control" id="signupName" placeholder="Enter your full name"
                            style="padding-left: 45px;" required>
                    </div>
                </div>

                <div class="form-group mb-3">
                    <label for="signupEmail" class="form-label">Email Address *</label>
                    <div class="input-group position-relative">
                        <i class="bi bi-envelope position-absolute" style="left: 15px; top: 12px; z-index: 10;"></i>
                        <input type="email" class="form-control" id="signupEmail" placeholder="Enter your email"
                            style="padding-left: 45px;" required>
                    </div>
                </div>

                <div class="form-group mb-3">
                    <label for="signupPhone" class="form-label">Phone Number *</label>
                    <div class="input-group position-relative">
                        <i class="bi bi-phone position-absolute" style="left: 15px; top: 12px; z-index: 10;"></i>
                        <input type="tel" class="form-control" id="signupPhone" placeholder="10-digit mobile number"
                            maxlength="10" style="padding-left: 45px;" required>
                    </div>
                </div>

                <div class="form-group mb-3">
                    <label for="signupPassword" class="form-label">Password *</label>
                    <div class="input-group position-relative">
                        <i class="bi bi-lock position-absolute" style="left: 15px; top: 12px; z-index: 10;"></i>
                        <input type="password" class="form-control" id="signupPassword" placeholder="Create a password"
                            style="padding-left: 45px;" required>
                    </div>
                    <div class="password-strength mt-2">
                        <div class="progress" style="height: 5px;">
                            <div id="passwordStrengthBar" class="progress-bar" style="width: 0%"></div>
                        </div>
                        <small class="text-muted" id="strengthText">Enter password</small>
                    </div>
                </div>

                <div class="form-group mb-4">
                    <label class="checkbox-container">
                        <input type="checkbox" id="termsAgree" required>
                        <span class="checkmark"><i class="bi bi-check"></i></span>
                        I agree to the <a href="#" class="text-success">Terms of Service</a> and <a href="#"
                            class="text-success">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="auth-btn w-100" id="signupSubmitBtn">
                    <span class="btn-text">Create Account</span>
                    <span class="spinner-border spinner-border-sm ms-2 d-none" id="signupSpinner"></span>
                </button>

                <div class="auth-footer text-center mt-4">
                    Already have an account? <a href="index.html" class="text-success text-decoration-none fw-bold">Sign
                        In</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay d-none">
        <div class="loading-content">
            <div class="spinner-border text-success" style="width: 4rem; height: 4rem;" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <h4 class="mt-3 text-white">Creating your account...</h4>
            <p class="text-white">Please wait while we set up your profile</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="SessionManager.js"></script>
    <script type="module" src="auth.js"></script>
</body>

</html>
